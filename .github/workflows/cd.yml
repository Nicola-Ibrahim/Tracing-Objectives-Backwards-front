name: 2. CD

on:
  push:
    tags:
      - 'v*'              # only fires on git tag — never on branch merge

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}-frontend

jobs:
  build-and-push:
    uses: Nicola-Ibrahim/Tracing-Objectives-Backwards-Devops/.github/workflows/reusable-cd-docker.yml@main
    with:
      image-name: ${{ github.repository }}-frontend
      target: runner
      build-args: |
        BACKEND_URL=${{ secrets.BACKEND_URL }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [ build-and-push ]
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
    steps:
      - name: Trigger Render Deploy
        run: |
          [ -n "$DEPLOY_HOOK" ] || { echo "❌ DEPLOY_HOOK is empty — aborting"; exit 1; }
          echo "🚀 Releasing ${{ github.ref_name }}..."
          curl -fsSL "$DEPLOY_HOOK"
          echo "✅ Done"
name: 1. CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Testing & Linting ────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm lint

      # - name: Run Tests
      #   run: pnpm test --if-present

  # ── Production Image Smoke Test (PR to main only) ─────────────────────────
  smoke-test:
    needs: [ test ]
    if: github.event_name == 'pull_request' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: false
          load: true
          tags: frontend-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BACKEND_URL=${{ secrets.BACKEND_URL }}

      - name: Run & Verify Health
        run: |
          docker run -d \
            --name frontend-ci \
            -p 3000:3000 \
            frontend-ci:latest

          for i in {1..10}; do
            if curl -sf http://localhost:3000/api/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 3
          done
          echo "❌ Health check timed out"
          docker logs frontend-ci
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f frontend-ci 2>/dev/null || true